<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socket.io Chat Test</title>
    <style>
        body { font-family: sans-serif; margin: 2rem; max-width: 600px; }
        .form-group { margin-bottom: 1rem; }
        #log { 
            border: 1px solid #ccc; 
            padding: 10px; 
            height: 300px; 
            overflow-y: scroll; 
            background: #f9f9f9; 
            margin-top: 1rem;
            font-family: monospace;
            font-size: 13px;
        }
        .error { color: red; }
        .success { color: green; }
        .message { color: blue; }
        .system { color: #555; font-style: italic; }
    </style>
</head>
<body>
    <h2>Socket.io Chat Test</h2>

    <div class="form-group">
        <label for="interestId">Interest ID:</label>
        <input type="text" id="interestId" placeholder="Enter Interest ID">
        <button id="connectBtn">Connect & Join Room</button>
    </div>

    <div class="form-group">
        <label for="messageContent">Message:</label>
        <input type="text" id="messageContent" placeholder="Type a message..." disabled>
        <button id="sendBtn" disabled>Send Message</button>
    </div>

    <div id="log"></div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const logDiv = document.getElementById('log');
        const connectBtn = document.getElementById('connectBtn');
        const sendBtn = document.getElementById('sendBtn');
        const interestIdInput = document.getElementById('interestId');
        const messageInput = document.getElementById('messageContent');
        
        let socket;

        function log(msg, type = 'system') {
            const time = new Date().toLocaleTimeString();
            const p = document.createElement('div');
            p.className = type;
            p.textContent = `[${time}] ${msg}`;
            logDiv.appendChild(p);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        connectBtn.addEventListener('click', () => {
            const interestId = interestIdInput.value.trim();
            if (!interestId) return alert('Enter an Interest ID first');

            if (!socket) {
                // Initialize socket connection. 
                // NOTE: Requires { withCredentials: true } to send the httpOnly 'token' cookie automatically.
                socket = io('http://localhost:5001', {
                    withCredentials: true
                });

                socket.on('connect', () => {
                    log(`Socket connected (ID: ${socket.id}). Emitting join_room...`, 'success');
                    socket.emit('join_room', { interestId });
                    
                    // Enable message inputs
                    messageInput.disabled = false;
                    sendBtn.disabled = false;
                });

                socket.on('connect_error', (err) => {
                    log(`Connection Error: ${err.message}`, 'error');
                });

                socket.on('room_error', (data) => {
                    log(`Room Error: ${data.message}`, 'error');
                });

                socket.on('receive_message', (msg) => {
                    const senderName = msg.sender?.name || msg.sender || 'Unknown';
                    log(`Message from ${senderName}: ${msg.content}`, 'message');
                });

                socket.on('disconnect', () => {
                    log('Socket disconnected', 'system');
                    messageInput.disabled = true;
                    sendBtn.disabled = true;
                });
            } else {
                // If already connected, just try joining another room
                log(`Emitting join_room for ${interestId}...`, 'system');
                socket.emit('join_room', { interestId });
            }
        });

        sendBtn.addEventListener('click', () => {
            const interestId = interestIdInput.value.trim();
            const content = messageInput.value.trim();
            if (!content || !socket) return;
            
            socket.emit('send_message', { interestId, content });
            messageInput.value = '';
        });

        // Allow sending with Enter key
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendBtn.click();
        });
    </script>
</body>
</html>
